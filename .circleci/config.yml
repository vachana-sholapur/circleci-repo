version: 2.1

parameters:
  deploy_env:
    type: string
    default: "staging"
  run_tests:
    type: boolean
    default: true

jobs:
  build:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Build Step
          command: |
            echo "Building..."
            sleep 30
            mkdir -p artifacts
            echo "Build Output" > artifacts/build.txt
      - store_artifacts:
          path: artifacts
          destination: build-artifacts

  test:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Test Step
          command: |
            echo "Testing..."
            sleep 30
            mkdir -p test-results
            echo "Test Results" > test-results/results.txt
      - store_artifacts:
          path: test-results
          destination: test-artifacts

  deploy:
    docker:
      - image: cimg/base:stable
    steps:
      - checkout
      - run:
          name: Deploy Step
          command: |
            echo "Deploying to << pipeline.parameters.deploy_env >>..."
            sleep 30
            mkdir -p deploy-logs
            echo "Deploy Log" > deploy-logs/deploy.txt
      - store_artifacts:
          path: deploy-logs
          destination: deploy-artifacts

workflows:
  build-test-deploy:
    jobs:
      - build
      - test:
          requires:
            - build
      - deploy:
          requires:
            - test
